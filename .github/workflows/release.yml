name: Release Windows exporter

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: gh release create "$GITHUB_REF_NAME" "dist/AIStudioAuth-win-x64.exe#AIStudioAuth-win-x64.exe" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
