name: 发布

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: 发布到 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/AIStudioAuth-win-x64.exe
          generate_release_notes: true
